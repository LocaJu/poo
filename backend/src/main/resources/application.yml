server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: sublethub-backend
  datasource:
    url: jdbc:mysql://8.152.215.45:3306/sublethub?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: sublethub
    password: sublethub
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

# MyBatis 配置（XML 方式）
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.sublethub.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# JWT
jwt:
  secret: SubletHub-JWT-Secret-Key-Change-In-Production
  expiration-ms: 604800000

# 文件上传（图片）
upload:
  path: ./uploads
  max-file-size: 5MB
